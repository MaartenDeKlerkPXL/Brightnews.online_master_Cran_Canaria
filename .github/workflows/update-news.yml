name: "🚀 BrightNews: Automatische Update"

on:
  schedule:
    # Draait om 00:00 UTC (Nacht-update) en 12:00 UTC (Lunch-update)
    - cron: '0,8 * * *'
  workflow_dispatch: # Handmatige trigger blijft behouden

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write # Nodig om de nieuwe JSON data terug te kunnen pushen

    steps:
      - name: 📂 Code ophalen
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Haalt de volledige historie op voor een veiligere push

      - name: 🟢 Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Slaat node_modules op voor snellere volgende runs

      - name: 📦 Dependencies installeren
        run: npm install

      - name: 🤖 AI Verwerking (Scannen, Filteren & Vertalen)
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          # Voeg hier eventuele andere benodigde keys toe uit je .env
        run: node backend/processor.js

      - name: 💾 Wijzigingen opslaan
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "BrightNews Bot ✨"
          
          # Alleen JSON bestanden in de data map toevoegen
          git add data/*.json
          
          # Controleer of er echt iets veranderd is voor we committen
          if git diff --quiet && git diff --staged --quiet; then
            echo "Geen nieuwe artikelen gevonden."
          else
            git commit -m "🤖 Automatische nieuws update: $(date -u) [skip ci]"
            git push origin master
          fi