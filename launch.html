<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZNFX3R9BQV"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-ZNFX3R9BQV');
    </script>
    <link rel="icon" type="image/png" href="assets/brightnews-logo-faviconv5.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrightNews - Launch</title>
<script src="index.js"></script>
    <style>
        :root {
            --bright-green: #32cc32;
            --light-bg: #ffffff;
            --dark-text: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--light-bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: var(--dark-text);
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 800px;
            width: 90%;
        }

        .logo {
            width: 100%;
            max-width: 400px;
            height: auto;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            text-transform: uppercase;
        }

        .highlight { color: var(--bright-green); }

        /* Countdown Styles */
        #countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            font-weight: bold;
        }

        .time-part {
            display: flex;
            flex-direction: column;
            font-size: 2rem;
        }

        .time-part span {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #666;
        }

        /* Subscription Box */
        .subscribe-box {
            margin-top: 40px;
            background: #f4f4f4;
            padding: 25px;
            border-radius: 8px;
        }

        input[type="email"] {
            padding: 12px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        button {
            padding: 12px 25px;
            background-color: var(--bright-green);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .logo {
                max-width: 90vw;
                margin-bottom: 30px;
            }
            h1 { font-size: 1.8rem; }
            #countdown { gap: 10px; }
            .time-part { font-size: 1.5rem; }
            input[type="email"] { width: 100%; margin-bottom: 10px; }
            .subscribe-box { padding: 15px; }
        }
        /* Starttoestand: tekst is zichtbaar en de transitie duurt 0.5 seconden */
        .fade-text {
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }

        /* Toestand waarbij de tekst onzichtbaar is */
        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <img src="assets/brightnews-logo.png" alt="BrightNews Logo" class="logo">

    <p id="bright-hero" class="fade-text">Discover the bright side of the world. 🇬🇧</p>
    <div id="countdown">
        <div class="time-part"><div id="days">00</div><span>Days</span></div>
        <div class="time-part"><div id="hours">00</div><span>Hours</span></div>
        <div class="time-part"><div id="minutes">00</div><span>Min</span></div>
        <div class="time-part"><div id="seconds">00</div><span>Sec</span></div>
    </div>

    <h1>Launching on <span class="highlight">March 20, 2026</span></h1>

    <div class="subscribe-box">
        <p>Want to be notified when we go live?</p>
        <form id="notifyForm">
            <input type="email" id="email" placeholder="Your email address" required>
            <button type="submit">Keep me updated</button>
        </form>
        <p id="msg" style="display:none; font-size: 0.9rem; color: var(--bright-green);"></p>
    </div>

    <div style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 20px;">
        <p style="font-size: 0.8rem; opacity: 0.6;">BrightNews <sup>&copy;</sup> 2026 - Positivity First</p>
    </div>
</div>

<script>

    function portalCheck(e) {
        e.preventDefault();
        alert("Beveiligde toegang vereist voor beheer.");
        const user = prompt("Gebruikersnaam:");
        const pass = prompt("Wachtwoord:");
        if (user === "Maarten" && pass === "B2026") {
            window.location.href = "Home.html";
        } else {
            alert("Toegang geweigerd.");
        }
    }
    window.portalCheck = portalCheck;
    // Maak de functie globaal beschikbaar
    const hero = document.getElementById('bright-hero');
    const texts = [
        { t: "Ontdek de zonnige kant van de wereld.", f: "🇳🇱" },
        { t: "Discover the bright side of the world.", f: "🇬🇧" },
        { t: "Entdecken Sie die Sonnenseite der Welt.", f: "🇩🇪" },
        { t: "Découvrez le bon côté du monde.", f: "🇫🇷" },
        { t: "Descubre el lado brillante del mundo.", f: "🇪🇸" }
    ];

    let i = 0;
    setInterval(() => {
        // 1. Start fade-out animatie
        hero.classList.add('fade-out');

        // 2. Wacht 500ms (duur van de CSS transitie)
        setTimeout(() => {
            // 3. Verander de tekst en het vlaggetje
            i = (i + 2) % texts.length;
            hero.textContent = `${texts[i].t} ${texts[i].f}`;

            // 4. Start fade-in animatie
            hero.classList.remove('fade-out');
        }, 500); // Deze tijd moet gelijk zijn aan de CSS 'transition' tijd

    }, 4000); // Elke 3 seconden start de cyclus
    // 1. Countdown Logic (ongewijzigd)
    const launchDate = new Date("March 20, 2026 12:00:00 UTC").getTime();
    const timer = setInterval(() => {
        const now = new Date().getTime();
        const diff = launchDate - now;
        if (diff < 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerHTML = "WE ARE LIVE!";
            return;
        }
        document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById("minutes").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById("seconds").innerText = Math.floor((diff % (1000 * 60)) / 1000);
    }, 1000);

    // 2. Form Logic via Formspree (De 'Bright' manier voor statische sites)
    const form = document.getElementById('notifyForm');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const emailValue = document.getElementById('email').value;
        const msg = document.getElementById('msg');
        const button = form.querySelector('button');

        button.disabled = true;
        button.innerText = "Sending...";

        // Gebruik je eigen Formspree ID (ga naar formspree.io voor een gratis account)
        // OF gebruik tijdelijk een andere service
        fetch('https://formspree.io/f/xzdawllw', {
            method: 'POST',
            headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: emailValue })
        })
            .then(response => {
                if (response.ok) {
                    msg.innerText = "Success! We'll keep you updated.";
                    msg.style.display = "block";
                    form.reset();
                } else {
                    msg.innerText = "Oops! Something went wrong.";
                    msg.style.display = "block";
                }
            })
            .catch(err => {
                console.error("Error:", err);
                msg.innerText = "Error connecting to server.";
                msg.style.display = "block";
            })
            .finally(() => {
                button.disabled = false;
                button.innerText = "Keep me updated";
            });
    });
</script>
<script defer src="backend/subscribe.js"></script>
</body>
</html>
